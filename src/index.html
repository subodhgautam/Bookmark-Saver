<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Saver</title>
    <link href="./output.css" rel="stylesheet">
</head>

<body>

<div class="main_container bg-gray-200 flex justify-center items-center min-h-screen flex-col gap-6">

    <div class="bookmark_container">
        <h1 class="text-2xl md:w-3xl font-bold text-green-500">Bookmark Saver</h1>
        <form>
            <div class="div">
                <input type="text" id="bookmark_name" placeholder="Bookmark Name"  required class="" >
            </div>
            
            <div class="div">
                <input type="url" id="bookmark_url" placeholder="Bookmark URL" required >
            </div>
            
            <button type="submit" id="add_btn" class="btn bg-green-500  hover:bg-green-700 active:bg-green-300">Add Button</button>
        </form>
        
    </div>
    
    
    
    <div class="bookmark_container">
        <h1>Your Bookmarks</h1>
        
        <ul>
            <li>
                <span>
                    <a href="">Twitter</a>
                    <button>X</button>
                </span>
            </li>
        </ul>
        <!-- <button id="reset_all">Reset All</button> -->
    </div>
</body>

</div>
</html>
